[project]
name = "stamp"
description = ""
authors = [
    {name = "Niels Velthuijs", email = "niels@mhlangalab.org"},
    {name = "Siebren Frölich", email = "siebrenf@gmail.com"},
]
maintainers = [
    {name = "Siebren Frölich", email = "siebrenf@gmail.com"},
    {name = "Niels Velthuijs", email = "niels@mhlangalab.org"},
]
readme = "README.md"
license = "GPL-3.0-or-later"
license-files = ["LICENSE"]
dynamic = ["dependencies", "version"]

[build-system]
# hatchling is the build backend, and reads the version from the code
# unidep reads the dependcies from the requirements.yaml
requires = ["hatchling>=1.5.0", "unidep"]
build-backend = "hatchling.build"

[tool.hatch.version]
path = "stamp/__init__.py"

[tool.isort]
profile = "black"
conda_env = "requirements.yml"
overwrite_in_place = true
