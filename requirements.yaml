name: stamp
channels:
  - conda-forge
  - bioconda
dependencies:
  - adjustText
  - anndata
#  - h5py
  - matplotlib
  - natsort
  - numpy
  - pandas <3  # anndata 0.12 cannot handle string columns
  - pydeseq2
  - python >=3.12  # f-strings
  - python-igraph  # sc.tl.leiden
  - scanpy
  - scikit-learn
  - scipy
  - seaborn
  - statsmodels

# docs
  - sphinx
  - sphinx-rtd-theme
  - m2r2 >=0.3.2

# test
  - black
  - isort
  - ipykernel
  - pytest
